<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
        /* Inlined pet list styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: #f7f8fb;
            color: #222;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(29,31,35,0.06);
        }
        .title {
            margin: 0 0 12px 0;
            font-size: 28px;
        }
        .btn {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: #0b1226;
            background: #e6eef8;
            margin-right: 8px;
            font-size: 14px;
        }
        .btn.primary {
            background: #2b7be4;
            color: #fff;
        }
        .btn.danger {
            background: #ff6b6b;
            color: #fff;
        }
        .pet-list {
            list-style: none;
            padding: 0;
            margin: 16px 0 0 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .pet-item {
            border: 1px solid #eef2f7;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .pet-name {
            font-size: 18px;
            margin: 8px 0;
        }
        .pet-image {
            width: 100%;
            max-width: 220px;
            height: auto;
            border-radius: 6px;
            object-fit: cover;
            display: block;
            margin: 0 auto 8px auto;
        }
        .actions { margin-top: 8px; }
        </style>
        <title>Pet List</title>
</head>
<body>
    <div class="container">
        <h1 class="title">Pet list</h1>
        <p><a class="btn primary" href="{% url 'upload_pet' %}">Add Pet</a></p>
        <ul class="pet-list">
            {% for pet in pets %}
            <li class="pet-item">
                <h2 class="pet-name">{{ pet.pet_name }}</h2>
                <img class="pet-image" src="{{ pet.pet_images.url }}" alt="{{ pet.pet_name }}">
                <p class="actions">
                    <a class="btn" href="{% url 'update_pet' pet.id %}">Edit</a>
                    <a class="btn danger" href="{% url 'delete_pet' pet.id %}" onclick="return confirm('Delete this pet?');">Delete</a>
                </p>
            </li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
