<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
        /* Styling for upload form (inlined) */
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: linear-gradient(180deg, #0f1724 0%, #071021 100%);
            color: #e6eef8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .pet-form {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(2,6,23,0.6);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .form-title { margin: 0 0 12px 0; font-size: 20px; color: #fff; }
        label { display:block; margin-top:12px; font-size:14px; color:#cbd5e1; }
        .input {
            width: 100%;
            padding: 10px 12px;
            margin-top:6px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
            color: #e6eef8;
            box-sizing: border-box;
        }
        .input[type="file"] { padding: 8px 6px; }
        .form-actions { display:flex; gap:8px; margin-top:18px; }
        .btn { padding:8px 12px; border-radius:8px; text-decoration:none; border:none; cursor:pointer; background:#e6eef8; color:#071021; }
        .btn.primary { background:#2b7be4; color:#fff; }
        .btn:hover { opacity:0.95; }
        </style>
        <title>Upload Pet</title>
</head>
<body>
<!-- #create a from for uploading pet name and pet image -->
<form class="pet-form" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <h1 class="form-title">Add a Pet</h1>
    <label for="pet_name">Pet Name</label>
    <input class="input" type="text" name="pet_name" placeholder="Enter pet name">

    <label for="pet_images">Pet Image</label>
    <input class="input" type="file" name="pet_images">

    <div class="form-actions">
        <button class="btn primary" type="submit">Upload</button>
        <a class="btn" href="{% url 'pet_list' %}">Cancel</a>
    </div>

</form>

</body>
</html>
